name: Generate Index Pages & Deploy

on:
  push:
    branches:
      - main

# Only allow one deployment at a time; cancel in-progress runs if a newer push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit regenerated index files back to main
      pages: write      # to deploy to GitHub Pages
      id-token: write   # required by actions/deploy-pages

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index pages
        run: bash scripts/generate-indexes.sh

      - name: Commit updated indexes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $(find . \( -name "index.html" -o -name "index.json" \) -not -path "./.git/*" -not -path "./.github/*" -not -path "./scripts/*")
          git diff --cached --quiet || git commit -m "chore: regenerate index pages [skip ci]"
          git push

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
